
name: Nightscout Autotune

on:
  workflow_dispatch:

jobs:
  autotune:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "18"

      - run: npm install -g oref0

      - name: Run Autotune
        run: |
          mkdir -p output
          oref0-autotune \
            --ns-host $NIGHTSCOUT_HOST \
            --api-secret $API_SECRET \
            --dir ./output
        env:
          NIGHTSCOUT_HOST: ${{ secrets.NIGHTSCOUT_HOST }}
          API_SECRET: ${{ secrets.API_SECRET }}

      - uses: actions/upload-artifact@v4
        with:
          name: autotune-result
          path: output
