name: Nightscout Autotune

on:
  workflow_dispatch:

jobs:
  autotune:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "18"

      - run: npm install -g oref0

      # 🔥 데이터 폴더 생성
      - name: Prepare directory
        run: |
          mkdir -p autotune/settings

      # 🔥 기본 프로파일 생성 (임시)
      - name: Create dummy profile
        run: |
          echo '{}' > autotune/settings/autotune.json
          echo '{}' > autotune/settings/pumpprofile.json

      # 🔥 Autotune 실행
      - name: Run Autotune
        run: |
          oref0-autotune \
            --dir=./autotune \
            --ns-host=$NIGHTSCOUT_HOST \
            --api-secret=$API_SECRET
        env:
          NIGHTSCOUT_HOST: ${{ secrets.NIGHTSCOUT_HOST }}
          API_SECRET: ${{ secrets.API_SECRET }}

      # 결과 업로드
      - uses: actions/upload-artifact@v4
        with:
          name: autotune-result
          path: autotune
